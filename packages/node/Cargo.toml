[package]
name = "ledgr-engine-node"
version = "0.1.0"
edition = "2021"
description = "Node.js bindings for the Ledger Engine"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"
ledger-engine = { path = "../../" }
thiserror = "1"
faster-hex = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
opt-level = 3
lto = true
strip = "symbols"
